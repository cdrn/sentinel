services:
  backdraft:
    image: ghcr.io/cdrn/backdraft:latest
    container_name: backdraft
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/backdraft.db
    volumes:
      - backdraft-data:/app/data

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 backdraft

volumes:
  backdraft-data:
